<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Boarding Pass Scanner</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2563eb">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes laser {
            0%, 100% { top: 0%; }
            50% { top: 100%; }
        }
        .laser-line {
            height: 2px;
            background: rgba(239, 68, 68, 0.8);
            box-shadow: 0 0 10px 2px rgba(239, 68, 68, 0.5);
            position: absolute;
            width: 100%;
            animation: laser 2s infinite linear;
        }
        #video-container video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .scanner-box {
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 12px;
            overflow: hidden;
        }
        .scanner-corner {
            position: absolute;
            width: 20px;
            height: 20px;
            border: 4px solid #fff;
        }
    </style>
</head>
<body class="bg-black text-white font-sans overflow-hidden fixed inset-0">
    <!-- Camera Feed -->
    <div id="video-container" class="absolute inset-0 bg-gray-900 flex items-center justify-center">
        <video id="video" playsinline></video>
        
        <!-- Overlay -->
        <div class="absolute inset-0 flex flex-col items-center justify-center pointer-events-none">
            <div class="w-64 h-64 md:w-80 md:h-80 scanner-box relative">
                <!-- Corners -->
                <div class="scanner-corner top-0 left-0 border-r-0 border-b-0"></div>
                <div class="scanner-corner top-0 right-0 border-l-0 border-b-0"></div>
                <div class="scanner-corner bottom-0 left-0 border-r-0 border-t-0"></div>
                <div class="scanner-corner bottom-0 right-0 border-l-0 border-t-0"></div>
                
                <!-- Laser -->
                <div class="laser-line"></div>
            </div>
            <p class="mt-6 text-sm text-gray-300 bg-black/40 px-4 py-2 rounded-full backdrop-blur-sm">
                Align PDF417 barcode within the box
            </p>
        </div>
    </div>

    <!-- UI Controls -->
    <header class="absolute top-0 left-0 right-0 p-4 flex justify-between items-center bg-gradient-to-b from-black/70 to-transparent">
        <h1 class="font-bold text-lg flex items-center gap-2">
            <svg class="w-6 h-6 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm12 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 20h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z"></path></svg>
            Boarding Pass Scan
        </h1>
        <button id="toggle-camera" class="p-2 bg-white/20 rounded-full backdrop-blur-md hover:bg-white/30 transition-colors">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
        </button>
    </header>

    <!-- Error/Permission Message -->
    <div id="error-message" class="hidden absolute inset-0 bg-gray-900/90 flex flex-col items-center justify-center p-8 text-center">
        <svg class="w-16 h-16 text-red-500 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
        <h2 class="text-xl font-bold mb-2">Camera Access Required</h2>
        <p id="error-text" class="text-gray-400 mb-6">Please enable camera permissions to scan boarding passes.</p>
        <button onclick="window.location.reload()" class="px-6 py-2 bg-blue-600 rounded-lg font-semibold hover:bg-blue-700 transition-colors">Retry</button>
    </div>

    <!-- Result Drawer -->
    <div id="result-drawer" class="fixed bottom-0 left-0 right-0 transform translate-y-full transition-transform duration-300 ease-out z-50">
        <div class="bg-white text-gray-900 rounded-t-3xl p-6 shadow-2xl">
            <div class="w-12 h-1.5 bg-gray-200 rounded-full mx-auto mb-6"></div>
            
            <div class="space-y-4">
                <div class="flex justify-between items-start">
                    <div>
                        <p class="text-xs font-bold text-blue-600 uppercase tracking-wider">Passenger</p>
                        <h3 id="res-name" class="text-xl font-bold"> - </h3>
                    </div>
                    <div class="text-right">
                        <p class="text-xs font-bold text-blue-600 uppercase tracking-wider">Flight</p>
                        <h3 id="res-flight" class="text-xl font-bold"> - </h3>
                    </div>
                </div>

                <!-- Departure & Destination Highlighted -->
                <div class="flex items-center justify-between bg-blue-50 p-4 rounded-2xl border border-blue-100">
                    <div class="text-center flex-1">
                        <p class="text-[10px] font-bold text-blue-400 uppercase tracking-widest mb-1">Departure</p>
                        <p id="res-from" class="text-3xl font-black text-blue-700"> --- </p>
                    </div>
                    <div class="px-4 text-blue-300">
                        <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z"></path></svg>
                    </div>
                    <div class="text-center flex-1">
                        <p class="text-[10px] font-bold text-blue-400 uppercase tracking-widest mb-1">Destination</p>
                        <p id="res-to" class="text-3xl font-black text-blue-700"> --- </p>
                    </div>
                </div>

                <div class="grid grid-cols-3 gap-4 border-t border-gray-100 pt-4">
                    <div>
                        <p class="text-xs font-bold text-gray-400 uppercase tracking-wider">Seat</p>
                        <p id="res-seat" class="text-lg font-bold text-gray-800"> - </p>
                    </div>
                    <div>
                        <p class="text-xs font-bold text-gray-400 uppercase tracking-wider">Date</p>
                        <p id="res-date" class="text-lg font-bold text-gray-800"> - </p>
                    </div>
                    <div>
                        <p class="text-xs font-bold text-gray-400 uppercase tracking-wider">Boarding</p>
                        <p id="res-boarding" class="text-lg font-bold text-gray-800"> - </p>
                    </div>
                </div>

                <div id="raw-data-container" class="hidden">
                    <p class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-1">Raw BCBP Data</p>
                    <code id="res-raw" class="block bg-gray-50 p-3 rounded text-[10px] break-all font-mono leading-tight"></code>
                </div>

                <button id="scan-again" class="w-full py-4 bg-blue-600 text-white rounded-2xl font-bold shadow-lg shadow-blue-200 hover:bg-blue-700 active:scale-[0.98] transition-all">
                    Scan Next Pass
                </button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script type="text/javascript" src="https://unpkg.com/@zxing/library@latest/umd/index.min.js"></script>
    <script src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
